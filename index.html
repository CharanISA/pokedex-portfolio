<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Charan Sai Saragadam | Interactive Pokédex Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --red: #e11d48;
      --deep-red: #9f1239;
      --dark: #111827;
      --black: #020617;
      --screen: #dff7ff;
      --screen-2: #0f172a;
      --blue: #cb05b0;
      --yellow: #facc15;
      --green: #22c55e;
      --white: #ffffff;
      --muted: #94a3b8;
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at 20% 15%, rgba(56,189,248,0.22), transparent 28%),
        radial-gradient(circle at 80% 85%, rgba(225,29,72,0.28), transparent 32%),
        linear-gradient(135deg, #020617, #111827);
      display: grid;
      place-items: center;
      color: var(--white);
      overflow: hidden;
      padding: 1rem;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .pokedex {
      width: min(1180px, 96vw);
      height: min(720px, 94vh);
      background: linear-gradient(145deg, #f43f5e, var(--red) 45%, var(--deep-red));
      border-radius: 36px 36px 42px 42px;
      border: 5px solid rgba(255,255,255,0.16);
      box-shadow: 0 35px 90px rgba(0,0,0,0.6);
      display: grid;
      grid-template-rows: 86px 1fr;
      overflow: hidden;
      position: relative;

      animation: dexBoot 1.2s ease-out forwards;
    }

    .pokedex::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, rgba(255,255,255,0.16), transparent 28%),
        radial-gradient(circle at 12% 18%, rgba(255,255,255,0.15), transparent 18%);
      pointer-events: none;
    }

    .top-bar {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.4rem;
      border-bottom: 4px solid rgba(0,0,0,0.22);
      background: rgba(127, 29, 29, 0.22);
    }

    .lights {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .main-light {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 28%, #fff, #7dd3fc 32%, #0284c7 72%);
      border: 5px solid #e0f2fe;
      box-shadow: 0 0 30px rgba(56,189,248,0.95);
      animation: glow 3s infinite ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% {
         box-shadow: 
         0 0 20px rgba(56,189,248,0.75); 
        }
      50% { 
        box-shadow: 
        0 0 28px rgba(56,189,248,0.95); 
      }
    }

    .dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,0.25);
    }

    .dot.red { background: #fb7185; }
    .dot.yellow { background: #fde047; }
    .dot.green { background: #4ade80; }

    .brand {
      text-align: right;
    }

    .brand h1 {
      font-size: clamp(1.1rem, 2vw, 1.7rem);
      letter-spacing: -0.05em;
      line-height: 1;
      font-weight: 900;
    }

    .brand p {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.78);
      font-weight: 700;
    }

    .main-area {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      gap: 1rem;
      padding: 1.2rem;
      min-height: 0;

      animation: screenReveal 0.8s ease-out 0.7s both;
    }

    .left-shell,
    .right-shell {
      background: rgba(127, 29, 29, 0.42);
      border: 3px solid rgba(0,0,0,0.22);
      border-radius: 28px;
      padding: 1rem;
      min-height: 0;
    }

    .profile-screen {
      height: 100%;
      background: linear-gradient(180deg, #e0f2fe, #bfdbfe);
      color: #0f172a;
      border-radius: 22px;
      border: 6px solid #e5e7eb;
      box-shadow: inset 0 0 30px rgba(15,23,42,0.2);
      padding: 1rem;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      position: relative;

      animation: profileReveal 1.5s ease-out forwards;
    }

    .profile-screen::after {
      content: "";
      position: absolute;
      top: -30%;
      left: 0;
      width: 100%;
      height: 20%;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.45), transparent);
      animation: scan 5s infinite linear;
      pointer-events: none;
    }

    @keyframes scan {
      from { transform: translateY(-100%); }
      to { transform: translateY(750%); }
    }

    @keyframes profileReveal {
  from {
    opacity: 0;
    transform: translateY(15px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

    @keyframes dexBoot {
  0% {
    opacity: 0;
    transform: scale(0.96);
    filter: brightness(0.5);
  }

  40% {
    opacity: 1;
    filter: brightness(1.25);
  }

  100% {
    opacity: 1;
    transform: scale(1);
    filter: brightness(1);
  }
}

@keyframes screenReveal {
  from {
    opacity: 0;
    transform: translateY(15px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes screenBoot {
  0% {
    opacity: 0;
    transform: scaleY(0.05);
    filter: brightness(3);
  }

  35% {
    opacity: 1;
    filter: brightness(2);
  }

  100% {
    opacity: 1;
    transform: scaleY(1);
    filter: brightness(1);
  }
}

    .entry-pill {
      width: fit-content;
      background: #0f172a;
      color: white;
      padding: 0.4rem 0.75rem;
      border-radius: 999px;
      font-weight: 900;
      font-size: 0.86rem;
    }

    .avatar-stage {
      display: grid;
      place-items: center;
      min-height: 0;
    }

    .avatar {
      width: min(310px, 58vh, 76%);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 9px solid #111827;
      background:
        radial-gradient(circle at center, white 0 19%, transparent 20%),
        linear-gradient(to bottom, #ef4444 0 47%, #111827 48% 53%, #f8fafc 54% 100%);
      display: grid;
      place-items: center;
      box-shadow: 0 18px 45px rgba(15,23,42,0.28);
      transition: transform 0.25s ease;

      animation: floatAvatar 3s ease-in-out infinite;
    }

    .avatar:hover {
      transform: scale(1.04) rotate(-2deg);
    }

    .avatar-inner {
      width: 125px;
      height: 125px;
      border-radius: 50%;
      background: white;
      border: 6px solid #111827;
      display: grid;
      place-items: center;
      text-align: center;
      font-weight: 900;
      font-size: 0.78rem;
      color: #64748b;
      padding: 0.8rem;
    }

    .profile-image {
        width: 70%;
        height: 70%;
        object-fit: cover;
        border-radius: 50%;
    }

    .identity h2 {
      font-size: clamp(2rem, 4vw, 3.8rem);
      line-height: 0.85;
      letter-spacing: -0.08em;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }

    .identity p {
      color: #475569;
      font-weight: 600;
    }

    .types {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.35rem;
    }

    .type {
      padding: 0.38rem 0.7rem;
      border-radius: 999px;
      color: white;
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .type.ai { background: #45007d; }
    .type.designer { background: #007a3b; }
    .type.data { background: #be0082; }

    .right-shell {
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 1rem;
    }

    .info-screen {
      background: #0f172a;
      border: 6px solid #1e293b;
      border-radius: 22px;
      padding: 1.15rem;
      min-height: 0;
      overflow-y: auto;
      padding-right: 0.75rem;
      box-shadow: inset 0 0 28px rgba(0,0,0,0.45);

      animation: screenBoot 1.4s ease-out forwards;
    }

    .screen-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding-bottom: 0.75rem;
      margin-bottom: 0.9rem;
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }

    .screen-header h3 {
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 1rem;
    }

    .screen-header span {
      font-size: 0.8rem;
      color: var(--green);
      font-family: monospace;
      font-weight: 900;
    }

    .content {
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .content p {
      color: #cbd5e1;
      font-size: 0.96rem;
      margin-bottom: 1rem;
    }

    .trainer-data {
      margin-top: 1.5rem;
      display: grid;
      gap: 1rem;
    }

    .trainer-row {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 0.8rem;
    }

    .trainer-label {
      display: block;
      color: #cb05b0;
      font-size: 0.8rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.35rem;
    }

    .trainer-value {
      color: #e2e8f0;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .stats {
      display: grid;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .stat {
      display: grid;
      grid-template-columns: 105px 1fr 38px;
      gap: 0.65rem;
      align-items: center;
      color: #e5e7eb;
      font-size: 0.88rem;
      font-weight: 800;
    }

    .bar {
      height: 11px;
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--green), var(--blue));
      transition: width 0.75s ease;
    }

    .grid-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }

    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 0.9rem;
      transition: 0.2s ease;
    }

    .card:hover {
       transform: translateY(-6px) scale(1.03);
       background: rgba(255,255,255,0.13);
    }

.project-images {
  display: flex;
  gap: 0.45rem;
  margin: 0.75rem 0;
}

.project-images img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 10px;
}

.project-images img:hover {
  transform: scale(1.05);
}

    .card h4 {

    }

    .card p {
      font-size: 0.86rem;
      margin: 0;
    }

    .tags {

      gap: 0.35rem;
      margin-top: 0.8rem;
      margin-bottom: 1rem;
    }

    .tag {
      background: #bae6fd;

      font-weight: 900;
      font-size: 0.68rem;

    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      margin-top: 1rem;
    }

    .link-btn {
      padding: 0.7rem 0.9rem;
      background: #0f172a;
      color: white; 
      border-radius: 12px;
      font-weight: 900;
      border: 2px solid rgba(255,255,255,0.08);
      transition: 0.2s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }

    .link-btn:hover {
      transform: translateY(-2px);
      background: linear-gradient(
        135deg, #ff4fd8, #9333ea
      );
      box-shadow: 
      0 0 12px rgba(246,0,201,0.4),
      0 0 24px rgba(153,0,156,0.4);
    }



    .button-pad {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.75rem;
    }

    .dex-btn {
      border: none;
      border-radius: 16px;
      padding: 0.85rem 0.5rem;
      background: #111827; 
      color: white;
      font-weight: 900;
      box-shadow: 0 6px 0 rgba(0,0,0,0.38);
      transition: 0.15s ease;
      text-transform: uppercase;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
    }

    .dex-btn:hover,
    .dex-btn.active {
  transform: translateY(4px);

  box-shadow:
    0 2px 0 rgba(0,0,0,0.38),
    0 0 12px rgba(246, 0, 201, 0.393),
    0 0 24px rgba(153, 0, 156, 0.392);

  background: linear-gradient(135deg, #ff4fd8, #9333ea);

  color: white;
}

    .dex-btn:active {
      transform: translateY(6px) scale(0.96);
    }

    .footer-note {
      position: absolute;
      left: 1.4rem;
      bottom: 0.7rem;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.65);
      font-weight: 700;
      z-index: 3;
    }

    @keyframes floatAvatar {
  0%, 100% {
    transform: translateY(0);
    }

  50% {
    transform: translateY(-12px);
    }
  }

  @keyframes screenGlow {
  0%, 100% {
    box-shadow: inset 0 0 28px rgba(0,0,0,0.45);
  }

  50% {
    box-shadow: inset 0 0 35px rgba(56,189,248,0.35);
  }
}

  @keyframes openDex {

  to {

.skill-category {

.contact-card {

.contact-link {

.contact-link:hover {

.contact-link.email {

  );

  @media (max-width: 850px) {
      body {

        min-height: 360px;

      .button-pad,
      .grid-cards {

      }
    }
  </style>
</head>

    function loadSection(sectionName) {
      const section = sections[sectionName];
      title.textContent = section.title;
      status.textContent = section.status;
      content.classList.remove('content');
      void content.offsetWidth;
      content.classList.add('content');
      content.innerHTML = section.html;
      if (sectionName === 'projects') {
      showProject('figma');
      }
      

      buttons.forEach(button => {
        button.classList.toggle('active', button.dataset.section === sectionName);
      });

      setTimeout(() => {
        document.querySelectorAll('.fill').forEach(fill => {
          fill.style.width = fill.dataset.width;
        });
      }, 80);
    }

    buttons.forEach(button => {
      button.addEventListener('click', () => loadSection(button.dataset.section));
    });

    document.addEventListener('keydown', event => {
      const keyMap = {
        '1': 'profile',
        '2': 'skills',
        '3': 'projects',
        '4': 'contact'
      };

      if (keyMap[event.key]) {
        loadSection(keyMap[event.key]);
      }
    });
